<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>08/03 - 12A7</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* khung trình chiếu */

#ppt-container{

position:fixed;
top:0;
left:0;

width:100vw;
height:100vh;

overflow:hidden;

}

/* iframe PowerPoint */

iframe{

position:absolute;

top:-60px;     /* cắt phần logo trên */
left:0;

width:100vw;
height:120vh;  /* phóng lớn để che thanh dưới */

border:none;

}

/* màn hình bắt đầu */

#start{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;
color:white;

display:flex;
align-items:center;
justify-content:center;

font-size:26px;

z-index:20;

}

/* loading */

#loading{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
align-items:center;
justify-content:center;

color:white;

font-size:22px;

z-index:10;

}

</style>

</head>

<body>

<div id="start">
Chạm màn hình để mở trình chiếu ❤️
</div>

<div id="loading">
Đang tải...
</div>

<audio id="music" loop>
<source src="DRT.mp3">
</audio>

<div id="ppt-container">

<iframe
src="https://1drv.ms/p/c/3ba650a7cebe97c3/IQRmDZjD-YPyTIShtBbB6m4MAbP3D9sFh-1VUQEvrzqQcnY?em=2&wdAr=1.7777777777777777"
allowfullscreen>
</iframe>

</div>

<script>

let start=document.getElementById("start")
let loading=document.getElementById("loading")
let music=document.getElementById("music")

start.onclick=function(){

music.play()

start.style.display="none"

setTimeout(function(){

loading.style.display="none"

},3000)

}

</script>

</body>
</html>
